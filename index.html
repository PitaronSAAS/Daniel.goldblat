<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Daniel Goldblat | Holocaust Guide</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Assistant', sans-serif;
    background: #050b14;
    color: #eaf0ff;
    transition: direction 0.3s ease;
}

/* LANGUAGE TOGGLE */
.toggle {
    position: fixed;
    top: 18px;
    right: 18px;
    z-index: 999;
    background: #0ea5e9;
    color: #fff;
    border: none;
    padding: 10px 14px;
    border-radius: 999px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

.toggle:hover {
    background: #0284c7;
}

/* HERO */
.hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 50px 20px;
    background: radial-gradient(circle at top, #10324a, #050b14 70%);
}

.hero-card {
    max-width: 1050px;
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1.3fr;
    gap: 60px;
    align-items: center;
}

/* SLIDESHOW */
.slideshow {
    position: relative;
    width: 100%;
    max-width: 360px;
    aspect-ratio: 3 / 4;
    border-radius: 18px;
    border: 1px solid #1f3b4d;
    box-shadow: 0 30px 80px rgba(0,0,0,0.65);
    overflow: hidden;
    margin: auto;
}

.slide {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 1s ease-in-out;
}

.slide.active {
    opacity: 1;
}

/* TYPOGRAPHY */
h1 {
    font-family: 'Playfair Display', serif;
    font-size: 64px;
    margin: 0;
}

.subtitle {
    font-size: 20px;
    margin-top: 10px;
    color: #93c5fd;
}

.badge {
    display: inline-block;
    margin-top: 16px;
    padding: 8px 16px;
    border-radius: 999px;
    font-size: 14px;
    background: rgba(16, 185, 129, 0.08);
    border: 1px solid rgba(52, 211, 153, 0.35);
    color: #a7f3d0;
}

.buttons {
    margin-top: 25px;
}

.btn {
    padding: 12px 24px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    margin-right: 10px;
    font-size: 16px;
    text-decoration: none;
    display: inline-block;
}

/* Specific spacing for right-to-left layout */
[dir="rtl"] .btn {
    margin-right: 0;
    margin-left: 10px;
}

.primary {
    background: linear-gradient(135deg, #0ea5e9, #10b981);
    color: #041018;
    font-weight: 700;
}

.primary:hover {
    background: linear-gradient(135deg, #38bdf8, #34d399);
}

/* SECTIONS */
.section {
    max-width: 1050px;
    margin: auto;
    padding: 80px 20px;
}

.card {
    background: linear-gradient(180deg, #0b1220, #0a1624);
    padding: 45px;
    border-radius: 18px;
    border: 1px solid #1f2a3a;
    box-shadow: 0 25px 70px rgba(0,0,0,0.5);
}

h2 {
    font-family: 'Playfair Display', serif;
    font-size: 34px;
    margin-bottom: 18px;
}

p, ul {
    font-size: 18px;
    line-height: 1.8;
    color: #cbd5e1;
}

ul {
    margin-top: 5px;
    margin-bottom: 20px;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 30px;
    color: #64748b;
}

/* RESPONSIVE */
@media(max-width: 900px) {
    .hero-card { grid-template-columns: 1fr; text-align: center; }
    h1 { font-size: 42px; }
    [dir="rtl"] .btn { margin-left: 0; margin-right: 0; margin-bottom: 10px; }
    .btn { margin-right: 0; margin-bottom: 10px; }
}
</style>
</head>

<body>

<button class="toggle" onclick="toggleLang()" id="langBtn">EN / HE / AR</button>

<!-- HERO -->
<section class="hero">
<div class="hero-card">

    <!-- IMAGE SLIDESHOW -->
    <div class="slideshow">
        <img src="bobi.png" class="slide active" alt="Daniel Goldblat 1">
        <img src="1000088836.jpg" class="slide" alt="Daniel Goldblat 2">
        <img src="1000088837.jpg" class="slide" alt="Daniel Goldblat 3">
        <img src="1000088840.png" class="slide" alt="Daniel Goldblat 4">
    </div>

    <div>

    </div>

">
</div>

</div>
</section>

<footer>© 2026 Daniel Goldblat</footer>

<script>
let lang = "en";

/* FULL LANGUAGE RENDER FUNCTION */
function renderLanguage(){
    const elements = document.querySelectorAll("[data-en]");
    elements.forEach(el => {
        const value = el.getAttribute("data-" + lang);
        if(value) {
            // Using innerHTML to support the list items inside the "About" section
            el.innerHTML = value;
        }
    });

    // Update document direction and lang attribute based on chosen language
    if(lang === "he" || lang === "ar") {
        document.body.dir = "rtl";
    } else {
        document.body.dir = "ltr";
    }
    document.documentElement.lang = lang;

    // Update Button Text to show current language sequence
    const btn = document.getElementById('langBtn');
    if(lang === "en") btn.innerText = "EN / עב / ع";
    if(lang === "he") btn.innerText = "עב / ع / EN";
    if(lang === "ar") btn.innerText = "ع / EN / עב";
}

/* TOGGLE: Cycles between English -> Hebrew -> Arabic */
function toggleLang(){
    if (lang === "en") {
        lang = "he";
    } else if (lang === "he") {
        lang = "ar";
    } else {
        lang = "en";
    }
    renderLanguage();
}

/* IMAGE SLIDESHOW FUNCTIONALITY */
let currentSlide = 0;
const slides = document.querySelectorAll('.slide');

function nextSlide() {
    slides[currentSlide].classList.remove('active');
    currentSlide = (currentSlide + 1) % slides.length;
    slides[currentSlide].classList.add('active');
}

// Switch images every 4 seconds
setInterval(nextSlide, 4000);

/* INITIALIZATION */
window.addEventListener("DOMContentLoaded", ()=>{
    renderLanguage();
});
</script>
</body>
</html>
