<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Daniel Goldblat | Holocaust Guide</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Assistant',sans-serif;
    background:#050b14;
    color:#eaf0ff;
}

/* LANGUAGE TOGGLE */
.toggle{
    position:fixed;
    top:18px;
    right:18px;
    z-index:999;
    background:#0ea5e9;
    border:none;
    padding:10px 14px;
    border-radius:999px;
    font-weight:700;
    cursor:pointer;
}

/* HERO */
.hero{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:50px 20px;
    background:radial-gradient(circle at top,#10324a,#050b14 70%);
}

.hero-card{
    max-width:1050px;
    width:100%;
    display:grid;
    grid-template-columns:1fr 1.3fr;
    gap:60px;
    align-items:center;
}

.photo{
    width:100%;
    max-width:360px;
    border-radius:18px;
    border:1px solid #1f3b4d;
    box-shadow:0 30px 80px rgba(0,0,0,0.65);
}

/* TYPOGRAPHY BIGGER */
h1{
    font-family:'Playfair Display',serif;
    font-size:64px;
    margin:0;
}

.subtitle{
    font-size:20px;
    margin-top:10px;
    color:#93c5fd;
}

.badge{
    display:inline-block;
    margin-top:16px;
    padding:8px 16px;
    border-radius:999px;
    font-size:14px;
    background:rgba(16,185,129,0.08);
    border:1px solid rgba(52,211,153,0.35);
    color:#a7f3d0;
}

.buttons{margin-top:25px;}

.btn{
    padding:12px 20px;
    border-radius:999px;
    border:none;
    cursor:pointer;
    margin-right:10px;
    font-size:15px;
}

.primary{
    background:linear-gradient(135deg,#0ea5e9,#10b981);
    color:#041018;
    font-weight:700;
}

.outline{
    background:transparent;
    border:1px solid #334155;
    color:#eaf0ff;
}

/* SECTIONS */
.section{
    max-width:1050px;
    margin:auto;
    padding:80px 20px;
}

.card{
    background:linear-gradient(180deg,#0b1220,#0a1624);
    padding:45px;
    border-radius:18px;
    border:1px solid #1f2a3a;
    box-shadow:0 25px 70px rgba(0,0,0,0.5);
}

h2{
    font-family:'Playfair Display',serif;
    font-size:34px;
    margin-bottom:18px;
}

p{
    font-size:18px;
    line-height:1.8;
    color:#cbd5e1;
}

/* MAP */
.map-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:25px;
    margin-top:20px;
}

.map-point{
    padding:18px;
    border-radius:14px;
    background:#0f1b2d;
    border:1px solid #1f3b4d;
    cursor:pointer;
    transition:0.3s;
}

.map-point:hover{
    transform:translateY(-4px);
    border-color:#38bdf8;
}

.map-details{
    margin-top:20px;
    padding:20px;
    border-radius:14px;
    background:#0c1626;
    border:1px solid #1f2a3a;
    min-height:120px;
}

/* HEBREW */
.he{
    direction:rtl;
    text-align:right;
}

/* FOOTER */
footer{
    text-align:center;
    padding:30px;
    color:#64748b;
}

/* RESPONSIVE */
@media(max-width:900px){
    .hero-card{grid-template-columns:1fr;text-align:center;}
    h1{font-size:42px;}
}
</style>
</head>

<body>

<button class="toggle" onclick="toggleLang()">EN / HE</button>

<!-- HERO -->
<section class="hero">
<div class="hero-card">

    <div>
        <img src="bobi.png" class="photo">
    </div>

    <div>
        <h1 data-en="Daniel Goldblat" data-he="דניאל גולדבלט"></h1>

        <div class="subtitle" data-en="Holocaust Guide | Yad Vashem & Poland" data-he="מדריך שואה | יד ושם ופולין"></div>

        <div class="badge" data-en="Memory • Education • Guided Historical Journeys" data-he="זיכרון • חינוך • מסעות היסטוריים"></div>

        <div class="buttons">
            <a href="#about"><button class="btn primary" data-en="Explore Work" data-he="המשך">Explore</button></a>
            <a href="#map"><button class="btn outline" data-en="View Map" data-he="מפה">Map</button></a>
        </div>
    </div>

</div>
</section>

<!-- ABOUT -->
<section id="about" class="section">
<div class="card">

<h2 data-en="About Daniel" data-he="אודות דניאל"></h2>

<p data-en="
Daniel Goldblat is a Holocaust educator and guide specializing in immersive historical journeys in Israel and Poland.
He leads groups through sites of profound historical significance, combining historical accuracy with human storytelling that makes the past deeply present and meaningful.

His approach is not only educational — it is experiential, guiding visitors through memory, silence, reflection, and understanding.
"
data-he="
דניאל גולדבלט הוא מדריך וחוקר שואה המתמחה בהובלת מסעות חינוכיים בישראל ובפולין.
הוא מוביל קבוצות לאתרים בעלי משמעות היסטורית עמוקה, ומשלב דיוק היסטורי עם סיפור אנושי ההופך את העבר לנוכח ומשמעותי.

גישתו אינה רק לימודית — אלא חווייתית, המובילה את המשתתפים דרך זיכרון, שקט, התבוננות והבנה.
"></p>

</div>
</section>

<!-- MAP -->
<section id="map" class="section">
<div class="card">

<h2 data-en="Poland Historical Map" data-he="מפת אתרים בפולין"></h2>

<p data-en="Click on a location to learn more about its historical significance."
   data-he="לחץ על אתר כדי ללמוד על משמעותו ההיסטורית."></p>

<div class="map-grid">

    <div class="map-point" onclick="show('Auschwitz')">Auschwitz-Birkenau</div>
    <div class="map-point" onclick="show('Treblinka')">Treblinka</div>
    <div class="map-point" onclick="show('Majdanek')">Majdanek</div>
    <div class="map-point" onclick="show('Warsaw')">Warsaw Ghetto</div>

</div>

<div class="map-details" id="details">
Select a location above.
</div>

</div>
</section>

<footer>© 2026 Daniel Goldblat</footer>

<script>
let lang="en";

function toggleLang(){
    lang = lang==="en" ? "he" : "en";
    document.querySelectorAll("[data-en]").forEach(el=>{
        el.innerText = el.getAttribute("data-"+lang);
    });
    document.body.dir = lang==="he" ? "rtl" : "ltr";
}

/* MAP INFO */
const info = {
    Auschwitz: "Auschwitz-Birkenau was the largest Nazi concentration and extermination camp, symbolizing the industrial scale of the Holocaust.",
    Treblinka: "Treblinka was one of the most lethal extermination camps, where hundreds of thousands of Jews were murdered.",
    Majdanek: "Majdanek was a concentration and extermination camp near Lublin, preserved today as a memorial site.",
    Warsaw: "The Warsaw Ghetto represents the largest Jewish ghetto during WWII and the site of the 1943 uprising."
};

function show(place){
    document.getElementById("details").innerText = info[place];
}
</script>

</body>
</html>
