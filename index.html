<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Daniel Goldblat | Holocaust Guide</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Assistant:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Assistant',sans-serif;
    background:#050b14;
    color:#e5e7eb;
}

/* HERO */
.hero {
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 20px;
    background: radial-gradient(circle at top, #0f2a3d, #050b14 70%);
}

.hero-card {
    max-width:980px;
    width:100%;
    display:grid;
    grid-template-columns: 1fr 1.2fr;
    gap:50px;
    align-items:center;
}

.photo {
    width:100%;
    max-width:340px;
    border-radius:16px;
    box-shadow:0 25px 70px rgba(0,0,0,0.65);
    border:1px solid #1f3b4d;
}

h1 {
    font-family:'Playfair Display',serif;
    font-size:54px;
    margin:0;
    color:#eaf2ff;
}

.subtitle {
    font-size:18px;
    margin-top:10px;
    color:#93c5fd;
}

.badge {
    display:inline-block;
    margin-top:16px;
    padding:6px 14px;
    border-radius:999px;
    font-size:13px;
    color:#a7f3d0;
    border:1px solid rgba(52,211,153,0.3);
    background:rgba(16,185,129,0.08);
}

/* BUTTONS */
.buttons { margin-top:25px; }

.btn {
    padding:11px 18px;
    border-radius:999px;
    border:none;
    cursor:pointer;
    margin-right:10px;
    font-size:14px;
}

.primary {
    background:linear-gradient(135deg,#0ea5e9,#10b981);
    color:#041018;
    font-weight:600;
}

.outline {
    background:transparent;
    border:1px solid #334155;
    color:#e5e7eb;
}

/* SECTION */
.section {
    max-width:980px;
    margin:0 auto;
    padding:70px 20px;
}

.card {
    background:linear-gradient(180deg,#0b1220,#0a1624);
    padding:38px;
    border-radius:18px;
    border:1px solid #1f2a3a;
    box-shadow:0 20px 60px rgba(0,0,0,0.45);
}

h2 {
    font-family:'Playfair Display',serif;
    font-size:30px;
    margin-bottom:15px;
    color:#eaf2ff;
}

p {
    line-height:1.75;
    color:#cbd5e1;
}

/* CONTACT */
.contact {
    margin-top:25px;
    padding-top:18px;
    border-top:1px solid #1f2a3a;
    color:#93c5fd;
}

/* HE/SWITCH */
.he { direction:rtl; text-align:right; }

/* TOGGLE */
.toggle {
    position:fixed;
    top:20px;
    right:20px;
    z-index:999;
    background:#0ea5e9;
    color:#041018;
    border:none;
    padding:10px 14px;
    border-radius:999px;
    cursor:pointer;
    font-weight:600;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:30px;
}

/* TESTIMONIAL */
.testimonial {
    font-style:italic;
    color:#cbd5e1;
    min-height:60px;
}

/* FADE IN */
.fade {
    opacity:0;
    transform:translateY(20px);
    transition:0.8s ease;
}
.fade.show {
    opacity:1;
    transform:translateY(0);
}

/* FOOTER */
footer {
    text-align:center;
    padding:30px;
    color:#64748b;
}

/* MOBILE */
@media(max-width:800px){
    .hero-card { grid-template-columns:1fr; text-align:center; }
    h1 { font-size:40px; }
}
</style>
</head>

<body>

<button class="toggle" onclick="toggleLang()">EN / HE</button>

<!-- HERO -->
<section class="hero">
<div class="hero-card">

    <div>
        <img src="bobi.png" class="photo">
    </div>

    <div>
        <h1 data-en="Daniel Goldblat" data-he="דניאל גולדבלט"></h1>

        <div class="subtitle" data-en="Holocaust Guide | Yad Vashem & Poland" data-he="מדריך שואה | יד ושם ופולין"></div>

        <div class="badge" data-en="Memory • Education • Historical Journeys" data-he="זיכרון • חינוך • מסעות היסטוריים"></div>

        <div class="buttons">
            <a href="#about"><button class="btn primary" data-en="Explore" data-he="המשך">Explore</button></a>
            <a href="#contact"><button class="btn outline" data-en="Contact" data-he="צור קשר">Contact</button></a>
        </div>
    </div>

</div>
</section>

<!-- ABOUT -->
<section id="about" class="section fade">
<div class="card">

<h2 data-en="About Daniel" data-he="אודות דניאל"></h2>

<p data-en="
Daniel Goldblat is a Holocaust educator and guide specializing in immersive historical journeys at Yad Vashem and throughout Poland.
His work goes beyond factual narration — he constructs emotional and historical bridges that allow visitors to understand not only what happened, but what it means today.

Each tour is carefully designed to balance historical precision with human storytelling, ensuring that memory is preserved with dignity, clarity, and depth.
"
data-he="
דניאל גולדבלט הוא מדריך וחוקר שואה המתמחה בהובלת מסעות חינוכיים ביד ושם ובפולין.
עבודתו חורגת מתיאור היסטורי בלבד — הוא יוצר גשר רגשי והיסטורי המאפשר למשתתפים להבין לא רק מה קרה, אלא גם מה המשמעות של הדברים כיום.

כל סיור נבנה בקפידה תוך שילוב של דיוק היסטורי וסיפור אנושי, במטרה לשמר את הזיכרון בכבוד, בהירות ועומק.
"></p>

</div>
</section>

<!-- PHILOSOPHY -->
<section class="section fade">
<div class="card">

<h2 data-en="Guiding Philosophy" data-he="תפיסת עולם"></h2>

<p data-en="
History must be experienced, not only learned. Daniel believes that Holocaust education requires silence, reflection, and human connection — not only information.
His guiding principle is to create space for understanding, dignity, and memory.
"
data-he="
היסטוריה אינה רק דבר שלומדים — אלא דבר שחווים. דניאל מאמין כי חינוך לשואה דורש שקט, התבוננות וחיבור אנושי — לא רק מידע.
עקרון ההנחיה שלו הוא יצירת מרחב להבנה, כבוד וזיכרון.
"></p>

</div>
</section>

<!-- TESTIMONIALS -->
<section class="section fade">
<div class="card">

<h2 data-en="Testimonials" data-he="המלצות"></h2>

<p class="testimonial" id="testimonial"></p>

</div>
</section>

<!-- CONTACT -->
<section id="contact" class="section fade">
<div class="card">

<h2 data-en="Contact" data-he="יצירת קשר"></h2>

<p>Email: your@email.com</p>
<p>Phone: +972XXXXXXXXX</p>

</div>
</section>

<footer>© 2026 Daniel Goldblat</footer>

<script>
let lang="en";

function toggleLang(){
    lang = lang === "en" ? "he" : "en";

    document.querySelectorAll("[data-en]").forEach(el=>{
        el.innerText = el.getAttribute("data-"+lang);
    });

    document.body.dir = lang === "he" ? "rtl" : "ltr";
}

/* TESTIMONIAL SLIDER */
const t = [
"An unforgettable and deeply human educational experience.",
"A powerful journey through memory and history.",
"חוויה עמוקה ומשמעותית שלא שוכחים."
];

let i = 0;
function rotate(){
    document.getElementById("testimonial").innerText = t[i];
    i = (i+1)%t.length;
}
setInterval(rotate,3000);
rotate();

/* SCROLL ANIMATION */
const fadeEls = document.querySelectorAll('.fade');
window.addEventListener('scroll',()=>{
    fadeEls.forEach(el=>{
        if(el.getBoundingClientRect().top < window.innerHeight - 100){
            el.classList.add('show');
        }
    });
});
</script>

</body>
</html>
